apiVersion: v1
kind: Secret
metadata:
  name: forge-secrets
  namespace: meshcue
  labels:
    app: forge
    app.kubernetes.io/name: forge
    app.kubernetes.io/part-of: meshcue
type: Opaque
# DO NOT commit real values — create secrets via:
#   kubectl create secret generic forge-secrets \
#     --namespace=meshcue \
#     --from-literal=MESHCUE_MESH_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=MESHCUE_WA_VERIFY_TOKEN="your-token" \
#     --from-literal=ZOO_CAD_API_KEY="your-key"
#
# Or use External Secrets Operator / Sealed Secrets for GitOps.
data: {}
