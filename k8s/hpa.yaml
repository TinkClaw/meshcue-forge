apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: forge-hpa
  namespace: meshcue
  labels:
    app: forge
    app.kubernetes.io/name: forge
    app.kubernetes.io/part-of: meshcue
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: forge
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
