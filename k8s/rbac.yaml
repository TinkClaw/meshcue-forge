apiVersion: v1
kind: ServiceAccount
metadata:
  name: forge
  namespace: meshcue
  labels:
    app: forge
    app.kubernetes.io/name: forge
    app.kubernetes.io/part-of: meshcue
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forge-role
  namespace: meshcue
  labels:
    app: forge
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: forge-rolebinding
  namespace: meshcue
  labels:
    app: forge
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: forge-role
subjects:
  - kind: ServiceAccount
    name: forge
    namespace: meshcue
