apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge
  namespace: meshcue
  labels:
    app: forge
    app.kubernetes.io/name: forge
    app.kubernetes.io/part-of: meshcue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: forge
  template:
    metadata:
      labels:
        app: forge
    spec:
      containers:
        - name: forge
          image: ghcr.io/tinkclaw/meshcue-forge:latest
          ports:
            - containerPort: 3000
              name: mcp
              protocol: TCP
            - containerPort: 8080
              name: health
              protocol: TCP
          envFrom:
            - configMapRef:
                name: forge-config
            - secretRef:
                name: forge-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: forge-data
              mountPath: /app/data
      volumes:
        - name: forge-data
          persistentVolumeClaim:
            claimName: forge-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forge-data-pvc
  namespace: meshcue
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
